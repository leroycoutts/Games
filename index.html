<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .game-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 250px;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        .game-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .game-description {
            font-size: 0.95em;
            opacity: 0.95;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .play-button {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1em;
        }
        .play-button:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 My Games</h1>
        <p class="subtitle">A collection of fun games built with HTML & JavaScript</p>
        
        <div class="games-grid">
            <a href="nitro-rush.html" class="game-card">
                <div class="game-icon">🚗</div>
                <div class="game-title">NITRO RUSH</div>
                <div class="game-description">An exciting racing game with high-speed action and thrilling gameplay!</div>
                <button class="play-button">Play Now</button>
            </a>
        </div>
        
        <div class="footer">
            <p>Created with ❤️ | Made possible by GitHub Pages</p>
        </div>
    </div>
</body>
</html>
